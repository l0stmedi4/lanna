<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Uma música para você 💖</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #121212;
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            text-align: center;
        }
        .container {
            background-color: #181818;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            max-width: 400px;
            width: 90%;
        }
        h1 {
            font-size: 24px;
            margin-bottom: 10px;
            color: #1DB954; /* Verde Spotify */
        }
        p {
            font-size: 16px;
            color: #b3b3b3;
            margin-bottom: 30px;
        }
        .spotify-embed {
            border-radius: 12px;
            overflow: hidden;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Para Você! 🎧</h1>
        <p>Encontrei essa música e lembrei de você. Espero que goste.</p>
        
        <!-- INÍCIO DO EMBED SPOTIFY -->
        <iframe 
            src="https://open.spotify.com/intl-pt/track/4k3xDpAdBuM17mNNHhOZkK?si=53299fb318e74e2d" 
            width="100%" 
            height="352" 
            frameBorder="0" 
            allowfullscreen="" 
            allow="autoplay; clipboard-write; encrypted-media; fullscreen; picture-in-picture" 
            loading="lazy"
            class="spotify-embed">
        </iframe>
        <!-- FIM DO EMBED SPOTIFY -->
        
    </div>
</body>
</html>
